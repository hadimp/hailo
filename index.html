<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slingshot Cardinal Prototype</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0b1120;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        /* Animations */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
        
        .focus-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid rgba(56, 189, 248, 0.5);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .focus-ring::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(56, 189, 248, 0.2);
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .focus-ring.success {
            border-color: #4ade80;
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.6);
            transform: scale(1.1);
        }
        
        .focus-ring.success::after {
            border-color: rgba(74, 222, 128, 0.4);
            animation: none;
        }

        .charWrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center;
            z-index: 20;
        }

        .letter-node {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: absolute;
            top: -25px;
            left: -25px;
            color: #e2e8f0;
        }

        .slot-up { transform: translate(0, -100px); }
        .slot-right { transform: translate(100px, 0); }
        .slot-left { transform: translate(-100px, 0); }
        
        .ghost {
            opacity: 0.2;
            filter: blur(1px);
            background: transparent;
            border-color: rgba(255,255,255,0.1);
            color: #94a3b8;
            box-shadow: none;
        }
        
        .ghost-up { transform: translate(0, -165px) scale(0.65); }
        .ghost-right { transform: translate(165px, 0) scale(0.65); }
        .ghost-left { transform: translate(-165px, 0) scale(0.65); }

        /* Particle Animations */
        @keyframes pop-up {
            0% { transform: translate(0, -100px) scale(1); opacity: 1; }
            40% { transform: translate(0, -50px) scale(1.2); opacity: 0.8; }
            100% { transform: translate(0, 0) scale(0.8); opacity: 0; filter: blur(2px); }
        }
        @keyframes pop-right {
            0% { transform: translate(100px, 0) scale(1); opacity: 1; }
            40% { transform: translate(50px, 0) scale(1.2); opacity: 0.8; }
            100% { transform: translate(0, 0) scale(0.8); opacity: 0; filter: blur(2px); }
        }
        @keyframes pop-left {
            0% { transform: translate(-100px, 0) scale(1); opacity: 1; }
            40% { transform: translate(-50px, 0) scale(1.2); opacity: 0.8; }
            100% { transform: translate(0, 0) scale(0.8); opacity: 0; filter: blur(2px); }
        }

        .particle { pointer-events: none; z-index: 50; border-color: #38bdf8; color: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
        .anim-up { animation: pop-up 0.25s ease-in forwards; }
        .anim-right { animation: pop-right 0.25s ease-in forwards; }
        .anim-left { animation: pop-left 0.25s ease-in forwards; }

        .type-cursor {
            display: inline-block;
            width: 3px;
            height: 1.1em;
            background-color: #38bdf8;
            vertical-align: middle;
            margin-left: 6px;
            animation: blink 1s step-end infinite;
            border-radius: 2px;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.8);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }

        .cycle-flash {
            animation: flash 0.15s ease-out;
        }

        @keyframes flash {
            0% { transform: scale(0.95); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full relative"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const defaultFreq = "etaoinsrhdlucmfywgpbvkxqjz".split('');
        const nextLetterFreq = {
            'a': 'ntrsldcpmvbgkyfwzxjq', 'b': 'eouyilar', 'c': 'oetahrkil', 'd': 'eoriays',
            'e': 'rsndltmca', 'f': 'oeriutaf', 'g': 'ehoarilu', 'h': 'eaioyt', 'i': 'nstncrlmd',
            'j': 'ouea', 'k': 'eiyano', 'l': 'eioyadsu', 'm': 'eaoipu', 'n': 'dtgescoai',
            'o': 'nrumslwtd', 'p': 'roelapiu', 'q': 'ui', 'r': 'eiotasmd', 's': 'teoishu',
            't': 'heioar', 'u': 'rnstlcpm', 'v': 'eia', 'w': 'ahoie', 'x': 'tpceia', 'y': 'osema', 'z': 'eaio'
        };

        function getBaseProbabilities(lastChar) {
            if (!lastChar || lastChar === ' ') return defaultFreq;
            const l = lastChar.toLowerCase();
            if (nextLetterFreq[l]) {
                const preferred = nextLetterFreq[l].split('');
                return Array.from(new Set([...preferred, ...defaultFreq]));
            }
            return defaultFreq;
        }

        const App = () => {
            const [text, setText] = useState("");
            const [layer, setLayer] = useState(0);
            const [success, setSuccess] = useState(false);
            const [particles, setParticles] = useState([]);
            const [showLegend, setShowLegend] = useState(true);
            const [cycleKey, setCycleKey] = useState(0); // to trigger animation on cycle
            
            const downTimerRef = useRef(null);
            const downHandledRef = useRef(false);
            const isDownPressedRef = useRef(false);
            const lastEnterRef = useRef(0);

            const lastChar = text.slice(-1);
            const letters = useMemo(() => getBaseProbabilities(lastChar), [lastChar]);
            
            const handleSelect = (dir, char) => {
                if (!char) return;
                
                // Spawn particle
                const id = Date.now() + Math.random();
                setParticles(prev => [...prev, { id, dir, char }]);
                setTimeout(() => {
                    setParticles(prev => prev.filter(p => p.id !== id));
                }, 250);
                
                setText(prev => prev + char);
                setLayer(0);
                setShowLegend(false);
            };

            const handleBackspace = () => {
                setText(prev => prev.slice(0, -1));
                setLayer(0);
                setCycleKey(prev => prev + 1);
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    const offset = layer * 3;
                    const getChar = (idx) => letters[idx % letters.length];
                    
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        handleSelect('up', getChar(offset));
                    } else if (e.key === 'ArrowRight') {
                        e.preventDefault();
                        handleSelect('right', getChar(offset + 1));
                    } else if (e.key === 'ArrowLeft') {
                        e.preventDefault();
                        handleSelect('left', getChar(offset + 2));
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        if (isDownPressedRef.current) return;
                        isDownPressedRef.current = true;
                        downHandledRef.current = false;
                        
                        downTimerRef.current = setTimeout(() => {
                            downHandledRef.current = true;
                            handleBackspace();
                            
                            // Setup repeating backspace if holding down
                            downTimerRef.current = setInterval(() => {
                                handleBackspace();
                            }, 120);
                        }, 400);
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        const now = Date.now();
                        if (now - lastEnterRef.current < 300) {
                            // Double tap Enter
                            setSuccess(true);
                            setTimeout(() => setSuccess(false), 1000);
                        } else {
                            // Single press Enter
                            setText(prev => prev + " ");
                            setLayer(0);
                        }
                        lastEnterRef.current = now;
                    } else if (e.key === 'Backspace') {
                        // Allow normal backspace for testing
                        handleBackspace();
                    }
                };

                const handleKeyUp = (e) => {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        isDownPressedRef.current = false;
                        clearInterval(downTimerRef.current);
                        clearTimeout(downTimerRef.current);
                        
                        if (!downHandledRef.current) {
                            // Short press -> Cycle letters
                            const maxLayers = Math.ceil((letters.length || 26) / 3);
                            setLayer(prev => (prev + 1) % maxLayers);
                            setCycleKey(prev => prev + 1); // trigger blink
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                    clearInterval(downTimerRef.current);
                    clearTimeout(downTimerRef.current);
                };
            }, [layer, letters, text]);

            const offset = layer * 3;
            const getChar = (idx) => letters[idx % letters.length].toUpperCase();

            return (
                <div className="flex flex-col items-center w-full h-full relative" onClick={() => window.focus()}>
                    {/* Background decoration */}
                    <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-500/10 blur-[120px] rounded-full pointer-events-none"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-500/10 blur-[100px] rounded-full pointer-events-none"></div>

                    {/* Header area */}
                    <div className="absolute top-0 w-full p-8 md:p-12 flex justify-center items-start z-30">
                        <div className="glass-panel px-8 py-6 min-w-[320px] max-w-4xl text-center shadow-2xl">
                            <h2 className="text-slate-400 text-xs font-bold tracking-[0.2em] uppercase mb-4">Text Entry</h2>
                            <div className="text-4xl sm:text-5xl md:text-6xl font-light text-white tracking-wide break-words min-h-[80px] flex items-center justify-center">
                                {text || <span className="opacity-20 italic">Type something...</span>}
                                <span className={`type-cursor ${success ? 'hidden' : ''}`}></span>
                            </div>
                        </div>
                    </div>

                    {/* Main Slingshot Arena */}
                    <div className="flex-1 w-full flex justify-center items-center relative scale-[1.15] md:scale-125 z-20">
                        {/* Reference Ring */}
                        <div className={`focus-ring ${success ? 'success' : ''}`}>
                            {success && (
                                <svg className="w-8 h-8 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                                </svg>
                            )}
                            
                            {/* Central guiding dot when empty */}
                            {!success && <div className="w-2 h-2 rounded-full bg-slate-600 shadow-[0_0_10px_rgba(255,255,255,0.2)]"></div>}
                        </div>

                        {/* Slots container (re-renders to trigger cycle animation) */}
                        <div key={cycleKey} className="charWrapper cycle-flash">
                            {/* Main selection slots */}
                            <div className="letter-node slot-up">{getChar(offset)}</div>
                            <div className="letter-node slot-right">{getChar(offset + 1)}</div>
                            <div className="letter-node slot-left">{getChar(offset + 2)}</div>
                            
                            {/* Ghost layer (upcoming letters) */}
                            <div className="letter-node ghost ghost-up">{getChar(offset + 3)}<div className="text-[10px] mt-8 text-blue-300/50">↓</div></div>
                            <div className="letter-node ghost ghost-right">{getChar(offset + 4)}<div className="text-[10px] mt-8 text-blue-300/50">↓</div></div>
                            <div className="letter-node ghost ghost-left">{getChar(offset + 5)}<div className="text-[10px] mt-8 text-blue-300/50">↓</div></div>
                        </div>
                        
                        {/* Particle effects for pops - outside the cycleKey wrapper so they persist during layer swaps */}
                        <div className="charWrapper">
                            {particles.map(p => (
                                <div key={p.id} className={`letter-node particle anim-${p.dir}`}>
                                    {p.char.toUpperCase()}
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* UI Hint Legend */}
                    <div className={`absolute bottom-8 md:bottom-12 transition-all duration-1000 z-30 ${showLegend ? 'opacity-100 translate-y-0' : 'opacity-30 translate-y-4 hover:opacity-100 hover:translate-y-0'}`}>
                        <div className="flex flex-wrap gap-4 md:gap-8 justify-center text-[13px] md:text-sm text-slate-400 glass-panel px-6 py-4 shadow-xl">
                            <div className="flex items-center gap-3">
                                <div className="px-2 py-1 bg-slate-800/80 rounded border border-slate-700/50 shadow-inner font-mono text-xs">↑ ← →</div> 
                                <span>Select Letter</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="px-2 py-1 bg-slate-800/80 rounded border border-slate-700/50 shadow-inner font-mono text-xs">↓</div> 
                                <span>Cycle Letters</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="px-2 py-1 bg-slate-800/80 rounded border border-slate-700/50 shadow-inner font-mono text-xs text-rose-300">Hold ↓</div> 
                                <span>Backspace</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="px-2 py-1 bg-slate-800/80 rounded border border-slate-700/50 shadow-inner font-mono text-xs text-green-300">Enter</div> 
                                <span>Space / 2x Finish</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
