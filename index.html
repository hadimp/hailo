<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hailo Paradigm</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="src/styles/main.css">
</head>

<body>
    <div id="root" class="w-full h-full relative"></div>

    <!-- Native Data Modules -->
    <script src="src/data/bigrams.js"></script>
    <script src="src/data/words.js"></script>
    <script src="src/data/frequencies.js"></script>

    <!-- Native Engine Modules -->
    <script src="src/engine/Trie.js?v=2"></script>
    <script src="src/engine/Predictor.js?v=2"></script>
    <script src="src/engine/Analytics.js?v=3"></script>

    <!-- Shared Constants & Helpers (plain JS, no JSX) -->
    <script src="src/components/constants.js"></script>
    <script src="src/components/helpers.js"></script>

    <!-- Shared UI Components (JSX, loaded via Babel) -->
    <script type="text/babel" src="src/components/SharedTypeArea.jsx"></script>
    <script type="text/babel" src="src/components/SharedActiveIndicator.jsx"></script>
    <script type="text/babel" src="src/components/SharedHailoRing.jsx"></script>

    <!-- Core Paradigm Components -->
    <script type="text/babel" src="src/components/HailoCore.jsx"></script>
    <script type="text/babel" src="src/components/ClassicKeyboard.jsx"></script>

    <!-- Mobile Components -->
    <script type="text/babel" src="src/components/MobileRemote.jsx"></script>

    <!-- Page Components -->
    <script type="text/babel" src="src/components/LandingPage.jsx"></script>
    <script type="text/babel" src="src/components/StatsDashboard.jsx"></script>
    <script type="text/babel" src="src/components/LeaderboardOverlay.jsx"></script>
    <script type="text/babel" src="src/components/TutorialOverlay.jsx"></script>

    <!-- App Orchestrators -->
    <script type="text/babel" src="src/components/MobileApp.jsx"></script>
    <script type="text/babel" src="src/components/MainApp.jsx"></script>

    <!-- App Entry Point -->
    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppRoot />);
    </script>
</body>

</html>
